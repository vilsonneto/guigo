services:
  evolution-postgres:
    image: postgres:15
    container_name: guigo_evolution_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution_local
      POSTGRES_DB: evolution
    ports:
      - "5433:5432"
    volumes:
      - evolution_pg_data:/var/lib/postgresql/data

  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: guigo_evolution_api
    restart: unless-stopped
    depends_on:
      - evolution-postgres
    ports:
      - "8081:8080"
    environment:
      SERVER_URL: http://localhost:8081
      SERVER_PORT: 8080
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-guigo-dev-key}
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:evolution_local@evolution-postgres:5432/evolution?schema=public
      DATABASE_SAVE_DATA_INSTANCE: true
      DATABASE_SAVE_DATA_NEW_MESSAGE: true
      DATABASE_SAVE_MESSAGE_UPDATE: true
      DATABASE_SAVE_DATA_CONTACTS: true
      DATABASE_SAVE_DATA_CHATS: true
      CACHE_REDIS_ENABLED: false
      CACHE_LOCAL_ENABLED: true
      RABBITMQ_ENABLED: false
      SQS_ENABLED: false
      WEBSOCKET_ENABLED: false
      PUSHER_ENABLED: false
      KAFKA_ENABLED: false
      TYPEBOT_ENABLED: false
      CHATWOOT_ENABLED: false
      OPENAI_ENABLED: false
      DIFY_ENABLED: false
      N8N_ENABLED: false
      QRCODE_LIMIT: 30
      LOG_LEVEL: ERROR,WARN,INFO,LOG,WEBHOOKS
      LOG_BAILEYS: error
      CORS_ORIGIN: "*"
      CORS_METHODS: GET,POST,PUT,DELETE
      CORS_CREDENTIALS: true
    volumes:
      - evolution_instances:/evolution/instances

volumes:
  evolution_pg_data:
  evolution_instances:
