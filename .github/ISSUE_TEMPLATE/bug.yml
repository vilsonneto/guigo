name: Bug Report
description: Reportar um bug no Guigo
labels: ["bug"]
body:
  - type: textarea
    id: descricao
    attributes:
      label: Descrição do bug
      description: O que aconteceu?
    validations:
      required: true
  - type: textarea
    id: esperado
    attributes:
      label: Comportamento esperado
      description: O que deveria ter acontecido?
    validations:
      required: true
  - type: textarea
    id: reproduzir
    attributes:
      label: Como reproduzir
      description: Passos para reproduzir o bug
    validations:
      required: false
  - type: dropdown
    id: workspace
    attributes:
      label: Workspace afetado
      options:
        - bot
        - admin
        - shared
        - monorepo (raiz)
    validations:
      required: true
